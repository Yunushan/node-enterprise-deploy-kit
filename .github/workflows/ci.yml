name: ci

on:
  push:
  pull_request:

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install CI tooling
        shell: bash
        run: |
          python3 -m pip install --user ansible-core
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          ansible-playbook --version
          ansible-galaxy collection install -r ansible/requirements.yml
          ansible-galaxy collection list ansible.windows
      - name: Repository verification
        shell: pwsh
        run: ./scripts/dev/Test-Repository.ps1
      - name: Optional ShellCheck
        shell: bash
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck deploy.sh scripts/dev/*.sh scripts/linux/*.sh
          else
            echo "shellcheck not found; skipping optional ShellCheck validation."
          fi

  windows-checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Windows repository verification
        shell: pwsh
        run: ./scripts/dev/Test-Repository.ps1 -SkipShellSyntax
