name: ci

on:
  push:
  pull_request:

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install CI tooling
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          python3 -m pip install --user ansible-core
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          ansible-playbook --version
          ansible-galaxy collection install -r ansible/requirements.yml
          ansible-galaxy collection list ansible.windows
      - name: Repository verification
        shell: pwsh
        run: ./scripts/dev/Test-Repository.ps1
      - name: ShellCheck
        shell: bash
        run: bash scripts/dev/lint-shellcheck.sh

  windows-checks:
    name: windows-checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - windows-2025
    steps:
      - uses: actions/checkout@v7
      - name: Windows repository verification
        shell: pwsh
        run: ./scripts/dev/Test-Repository.ps1 -SkipShellSyntax

  linux-family-static-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu
          - debian
          - linux-mint
          - rhel
          - oracle-linux
          - centos
          - centos-stream
          - rocky
          - almalinux
          - fedora
          - alpine
          - macos
          - freebsd
          - openbsd
          - netbsd
    steps:
      - uses: actions/checkout@v7
      - name: Platform family mapping
        shell: bash
        run: bash scripts/dev/test-platform-matrix.sh --case "${{ matrix.platform }}"

  linux-container-smoke:
    name: linux-container-smoke (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        platform:
          - ubuntu
          - debian
          - linux-mint
          - rhel
          - oracle-linux
          - centos
          - centos-stream
          - rocky
          - almalinux
          - fedora
          - alpine
    steps:
      - uses: actions/checkout@v7
      - name: Linux container Unix/Next.js smoke
        shell: bash
        run: bash scripts/dev/test-linux-container-smoke.sh --platform "${{ matrix.platform }}"

  macos-checks:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: macOS Unix/Next.js verification
        shell: bash
        run: |
          bash scripts/dev/test-platform-matrix.sh --case macos
          bash scripts/dev/lint-shell-basic.sh
          bash scripts/dev/test-unix-nextjs-support.sh
