name: ci

on:
  push:
  pull_request:

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install CI tooling
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          python3 -m pip install --user ansible-core
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          ansible-playbook --version
          ansible-galaxy collection install -r ansible/requirements.yml
          ansible-galaxy collection list ansible.windows
      - name: Repository verification
        shell: pwsh
        run: ./scripts/dev/Test-Repository.ps1 -SkipReleaseEvidenceSelfTests
      - name: ShellCheck
        shell: bash
        run: bash scripts/dev/lint-shellcheck.sh

  release-evidence-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - name: Release evidence self-tests
        shell: pwsh
        run: |
          ./scripts/dev/New-SupportEvidenceCollectionPack.ps1 -SelfTest
          ./scripts/dev/New-SupportEvidenceBundle.ps1 -SelfTest
          ./scripts/dev/New-SupportEvidenceBundle.ps1 `
            -SelfTest `
            -ValidateSupportClaim `
            -RequireCollectorSha256 `
            -RequireMinimumUptimeHours 72 `
            -RequireHostEvidenceWorkflowCollection
          ./scripts/dev/Test-SupportEvidenceBundle.ps1 -SelfTest
          ./scripts/dev/Test-SupportEvidenceCoverage.ps1 -SelfTest
          ./scripts/dev/Import-HostEvidenceArtifacts.ps1 -SelfTest
          ./scripts/dev/Invoke-SupportEvidenceReleaseWorkflow.ps1 -SelfTest
          ./scripts/dev/Test-ReleaseSupportReadiness.ps1 -SelfTest
          ./scripts/dev/New-ReleaseReadinessSummary.ps1 -SelfTest
          ./scripts/dev/Test-ReleaseReadinessSummary.ps1 -SelfTest

  windows-checks:
    name: windows-checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - windows-2025
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Windows repository verification
        shell: pwsh
        run: ./scripts/dev/Test-Repository.ps1 -SkipShellSyntax -SkipReleaseEvidenceSelfTests

  linux-family-static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu
          - debian
          - linux-mint
          - rhel
          - oracle-linux
          - centos
          - centos-stream
          - rocky
          - almalinux
          - fedora
          - alpine
          - macos
          - freebsd
          - openbsd
          - netbsd
    steps:
      - uses: actions/checkout@v7
      - name: Platform family mapping
        shell: bash
        run: bash scripts/dev/test-platform-matrix.sh --case "${{ matrix.platform }}"

  linux-container-smoke:
    name: linux-container-smoke (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        platform:
          - ubuntu
          - debian
          - linux-mint
          - rhel
          - oracle-linux
          - centos
          - centos-stream
          - rocky
          - almalinux
          - fedora
          - alpine
    steps:
      - uses: actions/checkout@v7
      - name: Linux container Unix/Next.js smoke
        shell: bash
        run: bash scripts/dev/test-linux-container-smoke.sh --platform "${{ matrix.platform }}"

  linux-container-real-nextjs:
    name: linux-container-real-nextjs (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-container-integration-result.json
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        platform:
          - ubuntu
          - debian
          - linux-mint
          - rhel
          - oracle-linux
          - centos
          - centos-stream
          - rocky
          - almalinux
          - fedora
          - alpine
    steps:
      - uses: actions/checkout@v7
      - name: Linux container real Next.js package/runtime integration
        shell: bash
        run: bash scripts/dev/test-linux-container-smoke.sh --platform "${{ matrix.platform }}" --real-nextjs
      - name: Upload Linux container Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: linux-container-real-nextjs-${{ matrix.platform }}
          path: .tmp/nextjs-container-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  linux-container-real-nextjs-systemv:
    name: linux-container-real-nextjs-systemv (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-container-integration-result.json
    steps:
      - uses: actions/checkout@v7
      - name: Install, run, and remove a real Next.js System V service
        shell: bash
        run: bash scripts/dev/test-linux-container-smoke.sh --platform ubuntu --real-nextjs --systemv-service-integration
      - name: Upload Linux container Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: linux-container-real-nextjs-systemv-ubuntu
          path: .tmp/nextjs-container-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  linux-container-real-nextjs-systemv-proxy:
    name: linux-container-real-nextjs-systemv-proxy (${{ matrix.proxy }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-container-integration-result.json
    strategy:
      fail-fast: false
      matrix:
        proxy:
          - apache
          - nginx
          - haproxy
          - traefik
    steps:
      - uses: actions/checkout@v7
      - name: Run a real Next.js System V service through a reverse proxy
        shell: bash
        run: |
          case '${{ matrix.proxy }}' in
            haproxy) proxy_flag=--haproxy-integration ;;
            *) proxy_flag=--${{ matrix.proxy }}-proxy-integration ;;
          esac
          bash scripts/dev/test-linux-container-smoke.sh --platform ubuntu --real-nextjs --systemv-service-integration "$proxy_flag"
      - name: Upload Linux container Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: linux-container-real-nextjs-systemv-proxy-ubuntu-${{ matrix.proxy }}
          path: .tmp/nextjs-container-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  linux-container-real-nextjs-openrc:
    name: linux-container-real-nextjs-openrc (alpine)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-container-integration-result.json
    steps:
      - uses: actions/checkout@v7
      - name: Install, run, and remove a real Next.js OpenRC service
        shell: bash
        run: bash scripts/dev/test-linux-container-smoke.sh --platform alpine --real-nextjs --openrc-service-integration
      - name: Upload Linux container Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: linux-container-real-nextjs-openrc-alpine
          path: .tmp/nextjs-container-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  linux-container-real-nextjs-openrc-proxy:
    name: linux-container-real-nextjs-openrc-proxy (${{ matrix.proxy }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-container-integration-result.json
    strategy:
      fail-fast: false
      matrix:
        proxy:
          - apache
          - nginx
          - haproxy
          - traefik
    steps:
      - uses: actions/checkout@v7
      - name: Run a real Next.js OpenRC service through a reverse proxy
        shell: bash
        run: |
          case '${{ matrix.proxy }}' in
            haproxy) proxy_flag=--haproxy-integration ;;
            *) proxy_flag=--${{ matrix.proxy }}-proxy-integration ;;
          esac
          bash scripts/dev/test-linux-container-smoke.sh --platform alpine --real-nextjs --openrc-service-integration "$proxy_flag"
      - name: Upload Linux container Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: linux-container-real-nextjs-openrc-proxy-alpine-${{ matrix.proxy }}
          path: .tmp/nextjs-container-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  linux-container-real-nextjs-apache:
    name: linux-container-real-nextjs-apache (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-container-integration-result.json
    steps:
      - uses: actions/checkout@v7
      - name: Run a real Next.js package through Apache
        shell: bash
        run: bash scripts/dev/test-linux-container-smoke.sh --platform ubuntu --real-nextjs --apache-proxy-integration
      - name: Upload Linux container Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: linux-container-real-nextjs-apache-ubuntu
          path: .tmp/nextjs-container-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  linux-container-real-nextjs-nginx:
    name: linux-container-real-nextjs-nginx (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-container-integration-result.json
    steps:
      - uses: actions/checkout@v7
      - name: Run a real Next.js package through Nginx
        shell: bash
        run: bash scripts/dev/test-linux-container-smoke.sh --platform ubuntu --real-nextjs --nginx-proxy-integration
      - name: Upload Linux container Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: linux-container-real-nextjs-nginx-ubuntu
          path: .tmp/nextjs-container-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  linux-container-real-nextjs-haproxy:
    name: linux-container-real-nextjs-haproxy (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-container-integration-result.json
    steps:
      - uses: actions/checkout@v7
      - name: Run a real Next.js package through HAProxy
        shell: bash
        run: bash scripts/dev/test-linux-container-smoke.sh --platform ubuntu --real-nextjs --haproxy-integration
      - name: Upload Linux container Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: linux-container-real-nextjs-haproxy-ubuntu
          path: .tmp/nextjs-container-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  linux-container-real-nextjs-traefik:
    name: linux-container-real-nextjs-traefik (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-container-integration-result.json
    steps:
      - uses: actions/checkout@v7
      - name: Run a real Next.js package through Traefik
        shell: bash
        run: bash scripts/dev/test-linux-container-smoke.sh --platform ubuntu --real-nextjs --traefik-proxy-integration
      - name: Upload Linux container Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: linux-container-real-nextjs-traefik-ubuntu
          path: .tmp/nextjs-container-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  real-linux-systemd-nextjs:
    name: real-linux-systemd-nextjs (ubuntu, nginx)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-integration-result.json
      NEXTJS_INTEGRATION_TARGET: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install Nginx
        shell: bash
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends nginx
      - name: Build, package, and run real Next.js through systemd and Nginx
        shell: bash
        run: sudo env GITHUB_ACTIONS="$GITHUB_ACTIONS" GITHUB_WORKFLOW="$GITHUB_WORKFLOW" GITHUB_JOB="$GITHUB_JOB" GITHUB_RUN_ID="$GITHUB_RUN_ID" GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" GITHUB_SHA="$GITHUB_SHA" NEXTJS_INTEGRATION_TARGET="$NEXTJS_INTEGRATION_TARGET" RUN_SYSTEMD_SERVICE_INTEGRATION=true RUN_NGINX_PROXY_INTEGRATION=true NEXTJS_INTEGRATION_RESULT_PATH="$NEXTJS_INTEGRATION_RESULT_PATH" NEXTJS_INTEGRATION_TEMP_ROOT=/srv/node-enterprise-deploy-kit-ci "$(command -v node)" scripts/dev/test-real-nextjs-integration.mjs
      - name: Upload real Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: real-linux-systemd-nextjs
          path: .tmp/nextjs-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  macos-checks:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: macOS Unix/Next.js verification
        shell: bash
        run: |
          bash scripts/dev/test-platform-matrix.sh --case macos
          bash scripts/dev/lint-shell-basic.sh
          bash scripts/dev/test-unix-nextjs-support.sh

  real-nextjs-integration:
    name: real-nextjs-integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      RUN_LAUNCHD_SERVICE_INTEGRATION: ${{ matrix.os == 'macos-15' && 'true' || 'false' }}
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-integration-result.json
      NEXTJS_INTEGRATION_TARGET: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-2022
          - windows-2025
          - macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Build, package, and run a real Next.js application
        shell: bash
        run: node scripts/dev/test-real-nextjs-integration.mjs
      - name: Upload real Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: real-nextjs-integration-${{ matrix.os }}
          path: .tmp/nextjs-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  real-windows-service-nextjs:
    name: real-windows-service-nextjs (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - windows-2025
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Build, package, and run real Next.js through WinSW
        shell: pwsh
        env:
          RUN_WINSW_SERVICE_INTEGRATION: "true"
          NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-integration-result.json
          NEXTJS_INTEGRATION_TARGET: ${{ matrix.os }}
        run: node scripts/dev/test-real-nextjs-integration.mjs
      - name: Upload real Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: real-windows-service-nextjs-${{ matrix.os }}
          path: .tmp/nextjs-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  real-windows-service-iis-nextjs:
    name: real-windows-service-iis-nextjs (${{ matrix.os }}, ${{ matrix.manager }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - windows-2025
        manager:
          - winsw
          - nssm
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install IIS and reverse-proxy dependencies
        shell: pwsh
        run: |
          if (Get-Command Install-WindowsFeature -ErrorAction SilentlyContinue) {
            Install-WindowsFeature -Name Web-Server, Web-WebSockets -IncludeManagementTools | Out-Host
          } else {
            Enable-WindowsOptionalFeature -Online -FeatureName IIS-WebServerRole,IIS-WebSockets -All -NoRestart | Out-Host
          }
          choco install urlrewrite --version=2.1.20190828 --yes --no-progress
          choco install iis-arr --version=3.0.20210521 --yes --no-progress
          if ('${{ matrix.manager }}' -eq 'nssm') {
            choco install nssm --version=2.24.101.20180116 --yes --no-progress
          }
          iisreset /restart
      - name: Build, package, and run real Next.js through IIS
        shell: pwsh
        env:
          RUN_WINDOWS_IIS_INTEGRATION: "true"
          NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-integration-result.json
          NEXTJS_INTEGRATION_TARGET: ${{ matrix.os }}
        run: |
          if ('${{ matrix.manager }}' -eq 'winsw') {
            $env:RUN_WINSW_SERVICE_INTEGRATION = 'true'
          } else {
            $env:RUN_NSSM_SERVICE_INTEGRATION = 'true'
          }
          node scripts/dev/test-real-nextjs-integration.mjs
      - name: Upload real Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: real-windows-service-iis-nextjs-${{ matrix.os }}-${{ matrix.manager }}
          path: .tmp/nextjs-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  real-macos-service-nextjs:
    name: real-macos-service-nextjs (macos-15)
    runs-on: macos-15
    timeout-minutes: 45
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-integration-result.json
      NEXTJS_INTEGRATION_TARGET: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Build, package, and run real Next.js through launchd
        shell: bash
        run: sudo env GITHUB_ACTIONS="$GITHUB_ACTIONS" GITHUB_WORKFLOW="$GITHUB_WORKFLOW" GITHUB_JOB="$GITHUB_JOB" GITHUB_RUN_ID="$GITHUB_RUN_ID" GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" GITHUB_SHA="$GITHUB_SHA" NEXTJS_INTEGRATION_TARGET="$NEXTJS_INTEGRATION_TARGET" NEXTJS_INTEGRATION_RESULT_PATH="$NEXTJS_INTEGRATION_RESULT_PATH" RUN_LAUNCHD_SERVICE_INTEGRATION=true "$(command -v node)" scripts/dev/test-real-nextjs-integration.mjs
      - name: Upload real Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: real-macos-service-nextjs
          path: .tmp/nextjs-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  real-macos-service-nginx-nextjs:
    name: real-macos-service-nginx-nextjs (macos-15)
    runs-on: macos-15
    timeout-minutes: 60
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-integration-result.json
      NEXTJS_INTEGRATION_TARGET: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install Nginx
        shell: bash
        run: brew install nginx
      - name: Build, package, and run real Next.js through launchd and Nginx
        shell: bash
        run: sudo env PATH="$PATH" GITHUB_ACTIONS="$GITHUB_ACTIONS" GITHUB_WORKFLOW="$GITHUB_WORKFLOW" GITHUB_JOB="$GITHUB_JOB" GITHUB_RUN_ID="$GITHUB_RUN_ID" GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" GITHUB_SHA="$GITHUB_SHA" NEXTJS_INTEGRATION_TARGET="$NEXTJS_INTEGRATION_TARGET" NEXTJS_INTEGRATION_RESULT_PATH="$NEXTJS_INTEGRATION_RESULT_PATH" RUN_LAUNCHD_SERVICE_INTEGRATION=true RUN_NGINX_PROXY_INTEGRATION=true "$(command -v node)" scripts/dev/test-real-nextjs-integration.mjs
      - name: Upload real Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: real-macos-service-nginx-nextjs
          path: .tmp/nextjs-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  real-macos-service-proxy-nextjs:
    name: real-macos-service-proxy-nextjs (macos-15, ${{ matrix.proxy }})
    runs-on: macos-15
    timeout-minutes: 60
    env:
      NEXTJS_INTEGRATION_RESULT_PATH: .tmp/nextjs-integration-result.json
      NEXTJS_INTEGRATION_TARGET: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - proxy: apache
            package: httpd
          - proxy: haproxy
            package: haproxy
          - proxy: traefik
            package: traefik
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install reverse proxy
        shell: bash
        run: brew install ${{ matrix.package }}
      - name: Build, package, and run real Next.js through launchd and the selected proxy
        shell: bash
        run: |
          case '${{ matrix.proxy }}' in
            apache) proxy_env=RUN_APACHE_PROXY_INTEGRATION=true ;;
            haproxy) proxy_env=RUN_HAPROXY_INTEGRATION=true ;;
            traefik) proxy_env=RUN_TRAEFIK_PROXY_INTEGRATION=true ;;
            *) echo "Unsupported macOS proxy matrix value." >&2; exit 1 ;;
          esac
          sudo env PATH="$PATH" GITHUB_ACTIONS="$GITHUB_ACTIONS" GITHUB_WORKFLOW="$GITHUB_WORKFLOW" GITHUB_JOB="$GITHUB_JOB" GITHUB_RUN_ID="$GITHUB_RUN_ID" GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" GITHUB_SHA="$GITHUB_SHA" NEXTJS_INTEGRATION_TARGET="$NEXTJS_INTEGRATION_TARGET" NEXTJS_INTEGRATION_RESULT_PATH="$NEXTJS_INTEGRATION_RESULT_PATH" RUN_LAUNCHD_SERVICE_INTEGRATION=true "$proxy_env" "$(command -v node)" scripts/dev/test-real-nextjs-integration.mjs
      - name: Upload real Next.js integration result
        if: always()
        uses: ./.github/actions/upload-nextjs-integration-result
        with:
          name: real-macos-service-proxy-nextjs-${{ matrix.proxy }}
          path: .tmp/nextjs-integration-result.json
          if-no-files-found: warn
          retention-days: 14

  nextjs-integration-summary:
    name: Next.js integration result summary
    if: ${{ always() }}
    needs:
      - linux-container-real-nextjs
      - linux-container-real-nextjs-systemv
      - linux-container-real-nextjs-systemv-proxy
      - linux-container-real-nextjs-openrc
      - linux-container-real-nextjs-openrc-proxy
      - linux-container-real-nextjs-apache
      - linux-container-real-nextjs-nginx
      - linux-container-real-nextjs-haproxy
      - linux-container-real-nextjs-traefik
      - real-linux-systemd-nextjs
      - real-nextjs-integration
      - real-windows-service-nextjs
      - real-windows-service-iis-nextjs
      - real-macos-service-nextjs
      - real-macos-service-nginx-nextjs
      - real-macos-service-proxy-nextjs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Download hosted Next.js integration results
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: '*nextjs*'
          path: .tmp/nextjs-integration-artifacts
      - name: Build Next.js integration summary
        shell: bash
        env:
          NEXTJS_INTEGRATION_NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          mkdir -p .tmp/nextjs-integration-artifacts
          node scripts/dev/New-NextJsIntegrationSummary.mjs \
            --input .tmp/nextjs-integration-artifacts \
            --output .tmp/nextjs-integration-summary
          cat .tmp/nextjs-integration-summary/nextjs-integration-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce hosted Next.js integration result coverage
        shell: bash
        run: node scripts/dev/New-NextJsIntegrationSummary.mjs --validate-summary .tmp/nextjs-integration-summary/nextjs-integration-summary.json
      - name: Upload Next.js integration summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-integration-summary
          path: .tmp/nextjs-integration-summary
          if-no-files-found: warn
          retention-days: 14
