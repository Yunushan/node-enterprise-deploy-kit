name: ci

on:
  push:
  pull_request:

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install CI tooling
        shell: bash
        run: |
          python3 -m pip install --user ansible-core
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          ansible-playbook --version
          ansible-galaxy collection install -r ansible/requirements.yml
          ansible-galaxy collection list ansible.windows
      - name: Repository verification
        shell: pwsh
        run: ./scripts/dev/Test-Repository.ps1
      - name: Optional ShellCheck
        shell: bash
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck --severity=warning deploy.sh scripts/dev/*.sh scripts/linux/*.sh
          else
            echo "shellcheck not found; skipping optional ShellCheck validation."
          fi

  windows-checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Windows repository verification
        shell: pwsh
        run: ./scripts/dev/Test-Repository.ps1 -SkipShellSyntax

  linux-family-static-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu
          - debian
          - linux-mint
          - rhel
          - oracle-linux
          - centos
          - centos-stream
          - rocky
          - almalinux
          - fedora
          - alpine
          - macos
          - freebsd
          - openbsd
          - netbsd
    steps:
      - uses: actions/checkout@v7
      - name: Platform family mapping
        shell: bash
        run: bash scripts/dev/test-platform-matrix.sh --case "${{ matrix.platform }}"

  macos-checks:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: macOS Unix/Next.js verification
        shell: bash
        run: |
          bash scripts/dev/test-platform-matrix.sh --case macos
          bash scripts/dev/lint-shell-basic.sh
          bash scripts/dev/test-unix-nextjs-support.sh
