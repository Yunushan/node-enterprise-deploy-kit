name: host-evidence

on:
  workflow_dispatch:
    inputs:
      runner_labels:
        description: 'JSON array of self-hosted runner labels, for example ["self-hosted","windows-server-2022"]'
        required: true
        default: '["self-hosted"]'
      platform:
        description: Evidence collection command family
        required: true
        type: choice
        options:
          - windows
          - unix
      config_path:
        description: Path to the deployed app config on the runner workspace
        required: true
        default: config/windows/app.config.json
      evidence_name:
        description: Artifact-safe name matching target-mode-service-proxy, with -fallback for fallback managers
        required: true
        default: host-evidence
      expected_target_id:
        description: Expected support matrix target ID, for example windows-server-2022 or ubuntu
        required: true
      expected_nextjs_mode:
        description: Expected Next.js mode, standalone or next-start
        required: true
        type: choice
        options:
          - standalone
          - next-start
      expected_service_manager:
        description: Expected workflow-capable service manager, for example winsw, nssm, systemd, systemv, openrc, or launchd
        required: true
        type: choice
        options:
          - winsw
          - nssm
          - pm2
          - systemd
          - systemv
          - openrc
          - launchd
      expected_reverse_proxy:
        description: Expected reverse proxy, for example iis, nginx, apache, haproxy, traefik, or none
        required: true
        type: choice
        options:
          - iis
          - nginx
          - apache
          - haproxy
          - traefik
          - none
      minimum_uptime_hours:
        description: Minimum service uptime required by status evidence
        required: true
        default: "72"
      require_reverse_proxy:
        description: Require reverse-proxy evidence during artifact validation
        required: true
        type: boolean
        default: true
      fail_on_warnings:
        description: Fail status/validation when warnings are present
        required: true
        type: boolean
        default: false
      upload_retention_days:
        description: Artifact retention days
        required: true
        default: "30"

permissions:
  contents: read

jobs:
  validate-dispatch:
    name: validate dispatch inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Validate self-hosted runner labels
        shell: pwsh
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
          EVIDENCE_NAME: ${{ inputs.evidence_name }}
          EXPECTED_NEXTJS_MODE: ${{ inputs.expected_nextjs_mode }}
          EXPECTED_REVERSE_PROXY: ${{ inputs.expected_reverse_proxy }}
          EXPECTED_SERVICE_MANAGER: ${{ inputs.expected_service_manager }}
          EXPECTED_TARGET_ID: ${{ inputs.expected_target_id }}
          MINIMUM_UPTIME_HOURS: ${{ inputs.minimum_uptime_hours }}
          PLATFORM: ${{ inputs.platform }}
          RUNNER_LABELS: ${{ inputs.runner_labels }}
          UPLOAD_RETENTION_DAYS: ${{ inputs.upload_retention_days }}
        run: ./scripts/dev/Test-HostEvidenceWorkflowInputs.ps1

  collect:
    name: collect host evidence
    needs: validate-dispatch
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 30
    env:
      CONFIG_PATH: ${{ inputs.config_path }}
      EVIDENCE_NAME: ${{ inputs.evidence_name }}
      EXPECTED_NEXTJS_MODE: ${{ inputs.expected_nextjs_mode }}
      EXPECTED_REVERSE_PROXY: ${{ inputs.expected_reverse_proxy }}
      EXPECTED_SERVICE_MANAGER: ${{ inputs.expected_service_manager }}
      EXPECTED_TARGET_ID: ${{ inputs.expected_target_id }}
      FAIL_ON_WARNINGS: ${{ inputs.fail_on_warnings }}
      MINIMUM_UPTIME_HOURS: ${{ inputs.minimum_uptime_hours }}
    steps:
      - name: Checkout repository without deleting local private config
        uses: actions/checkout@v7
        with:
          clean: false

      - name: Validate inputs for Windows collection
        if: ${{ inputs.platform == 'windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Assert-SafeRelativeConfigPath {
            param([string]$Value)
            if ([string]::IsNullOrWhiteSpace($Value)) {
              throw "config_path is required and must be a relative path inside the repository workspace."
            }
            $pathText = $Value.Trim()
            if ($pathText.Length -gt 240) {
              throw "config_path must be 240 characters or less."
            }
            if ($pathText -match '[\x00-\x1F\x7F:*?"<>|]') {
              throw "config_path must not contain control characters, drive letters, wildcards, or shell metacharacters."
            }
            if ($pathText -match '^[A-Za-z]:[\\/]' -or $pathText -match '^[\\/]' -or $pathText -match '^\\\\' -or $pathText -match '^//') {
              throw "config_path must be a relative path inside the repository workspace."
            }
            $normalizedPath = $pathText.Replace('\', '/')
            if ($normalizedPath -match '(^|/)\.\.(/|$)' -or $normalizedPath -match '/{2,}' -or $normalizedPath.EndsWith('/')) {
              throw "config_path must not contain parent traversal, empty path segments, or a trailing slash."
            }
          }
          Assert-SafeRelativeConfigPath -Value $env:CONFIG_PATH
          if (-not (Test-Path -LiteralPath $env:CONFIG_PATH -PathType Leaf)) {
            throw "config_path was not found on the self-hosted runner workspace."
          }
          if ($env:EVIDENCE_NAME -notmatch '^[A-Za-z0-9._-]+$') {
            throw "evidence_name must contain only letters, numbers, dot, underscore, or dash."
          }
          if ($env:MINIMUM_UPTIME_HOURS -notmatch '^\d+$') {
            throw "minimum_uptime_hours must be a non-negative integer."
          }
          foreach ($value in @($env:EXPECTED_TARGET_ID, $env:EXPECTED_NEXTJS_MODE, $env:EXPECTED_SERVICE_MANAGER, $env:EXPECTED_REVERSE_PROXY)) {
            if ($value -and $value -notmatch '^[A-Za-z0-9._-]+$') {
              throw "expected target, mode, service manager, and reverse proxy values must contain only letters, numbers, dot, underscore, or dash."
            }
          }
          New-Item -ItemType Directory -Force -Path (Join-Path "evidence" $env:EVIDENCE_NAME) | Out-Null

      - name: Validate inputs for Unix collection
        if: ${{ inputs.platform == 'unix' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$CONFIG_PATH" || ${#CONFIG_PATH} -gt 240 ]]; then
            echo "config_path is required, must be 240 characters or less, and must be a relative path inside the repository workspace." >&2
            exit 1
          fi
          if [[ "$CONFIG_PATH" == /* || "$CONFIG_PATH" == \\* || "$CONFIG_PATH" == *:* || "$CONFIG_PATH" == *//* || "$CONFIG_PATH" == */ ]]; then
            echo "config_path must be a relative path inside the repository workspace." >&2
            exit 1
          fi
          if [[ "$CONFIG_PATH" == "../"* || "$CONFIG_PATH" == *"/../"* || "$CONFIG_PATH" == *"/.." ]]; then
            echo "config_path must not contain parent traversal, empty path segments, or a trailing slash." >&2
            exit 1
          fi
          if [[ "$CONFIG_PATH" =~ [[:cntrl:]] || "$CONFIG_PATH" == *"*"* || "$CONFIG_PATH" == *"?"* || "$CONFIG_PATH" == *"'"* || "$CONFIG_PATH" == *'"'* || "$CONFIG_PATH" == *"<"* || "$CONFIG_PATH" == *">"* || "$CONFIG_PATH" == *"|"* ]]; then
            echo "config_path must not contain control characters, drive letters, wildcards, or shell metacharacters." >&2
            exit 1
          fi
          if [[ ! -f "$CONFIG_PATH" ]]; then
            echo "config_path was not found on the self-hosted runner workspace." >&2
            exit 1
          fi
          case "$EVIDENCE_NAME" in
            *[!A-Za-z0-9._-]*|'') echo "evidence_name must contain only letters, numbers, dot, underscore, or dash." >&2; exit 1 ;;
          esac
          case "$MINIMUM_UPTIME_HOURS" in
            ''|*[!0-9]*) echo "minimum_uptime_hours must be a non-negative integer." >&2; exit 1 ;;
          esac
          for value in "$EXPECTED_TARGET_ID" "$EXPECTED_NEXTJS_MODE" "$EXPECTED_SERVICE_MANAGER" "$EXPECTED_REVERSE_PROXY"; do
            case "$value" in
              *[!A-Za-z0-9._-]*) echo "expected target, mode, service manager, and reverse proxy values must contain only letters, numbers, dot, underscore, or dash." >&2; exit 1 ;;
            esac
          done
          mkdir -p "evidence/$EVIDENCE_NAME"

      - name: Collect Windows status evidence
        if: ${{ inputs.platform == 'windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $statusArgs = @(
            "-ConfigPath", $env:CONFIG_PATH,
            "-MinimumUptimeHours", $env:MINIMUM_UPTIME_HOURS,
            "-JsonPath", (Join-Path (Join-Path "evidence" $env:EVIDENCE_NAME) "status.json"),
            "-FailOnCritical"
          )
          if ($env:FAIL_ON_WARNINGS -eq "true") {
            $statusArgs += "-FailOnWarnings"
          }
          & ./status.ps1 @statusArgs

      - name: Collect Unix status evidence
        if: ${{ inputs.platform == 'unix' }}
        shell: bash
        run: |
          set -euo pipefail
          extra=()
          if [[ "$FAIL_ON_WARNINGS" == "true" ]]; then
            extra+=(--fail-on-warnings)
          fi
          sudo env \
            CI="${CI:-}" \
            GITHUB_ACTIONS="${GITHUB_ACTIONS:-}" \
            GITHUB_WORKFLOW="${GITHUB_WORKFLOW:-}" \
            GITHUB_RUN_ID="${GITHUB_RUN_ID:-}" \
            GITHUB_RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-}" \
            GITHUB_EVENT_NAME="${GITHUB_EVENT_NAME:-}" \
            GITHUB_REF_NAME="${GITHUB_REF_NAME:-}" \
            GITHUB_SHA="${GITHUB_SHA:-}" \
            bash scripts/linux/status-node-app.sh \
            "$CONFIG_PATH" \
            --minimum-uptime-hours "$MINIMUM_UPTIME_HOURS" \
            --json-output "evidence/$EVIDENCE_NAME/status.json" \
            --fail-on-critical \
            "${extra[@]}"

      - name: Upload safe status evidence
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.evidence_name }}
          path: evidence/${{ inputs.evidence_name }}/status.json
          if-no-files-found: error
          retention-days: ${{ inputs.upload_retention_days }}

  validate:
    name: validate uploaded evidence
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Download collected evidence
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.evidence_name }}
          path: evidence/${{ inputs.evidence_name }}

      - name: Validate collected evidence
        shell: pwsh
        env:
          EVIDENCE_NAME: ${{ inputs.evidence_name }}
          EXPECTED_NEXTJS_MODE: ${{ inputs.expected_nextjs_mode }}
          EXPECTED_REVERSE_PROXY: ${{ inputs.expected_reverse_proxy }}
          EXPECTED_SERVICE_MANAGER: ${{ inputs.expected_service_manager }}
          EXPECTED_TARGET_ID: ${{ inputs.expected_target_id }}
          FAIL_ON_WARNINGS: ${{ inputs.fail_on_warnings }}
          MINIMUM_UPTIME_HOURS: ${{ inputs.minimum_uptime_hours }}
          REQUIRE_REVERSE_PROXY: ${{ inputs.require_reverse_proxy }}
        run: |
          $ErrorActionPreference = "Stop"
          $validationArgs = @(
            "-EvidencePath", (Join-Path "evidence" $env:EVIDENCE_NAME),
            "-RequireNextJs",
            "-RequireDeploymentIdentity",
            "-RequireCollectorSha256",
            "-RequireCiCollection",
            "-RequireHostEvidenceWorkflowCollection",
            "-RequireMinimumUptimeHours", $env:MINIMUM_UPTIME_HOURS,
            "-MaxEvidenceAgeDays", "1"
          )
          $requireReverseProxy = ($env:REQUIRE_REVERSE_PROXY -eq "true")
          if ($env:EXPECTED_TARGET_ID) {
            $validationArgs += @("-ExpectedTargetId", $env:EXPECTED_TARGET_ID)
          }
          if ($env:EXPECTED_NEXTJS_MODE) {
            $validationArgs += @("-ExpectedNextJsMode", $env:EXPECTED_NEXTJS_MODE)
          }
          if ($env:EXPECTED_SERVICE_MANAGER) {
            $validationArgs += @("-ExpectedServiceManager", $env:EXPECTED_SERVICE_MANAGER)
          }
          if ($env:EXPECTED_REVERSE_PROXY) {
            $validationArgs += @("-ExpectedReverseProxy", $env:EXPECTED_REVERSE_PROXY)
            $requireReverseProxy = $true
            if ($env:EXPECTED_REVERSE_PROXY -eq "none") {
              $validationArgs += "-AllowReverseProxyNone"
            }
          }
          if ($requireReverseProxy) {
            $validationArgs += "-RequireReverseProxy"
          }
          if ($env:FAIL_ON_WARNINGS -eq "true") {
            $validationArgs += "-FailOnWarnings"
          }
          & ./scripts/dev/Test-HostEvidence.ps1 @validationArgs
