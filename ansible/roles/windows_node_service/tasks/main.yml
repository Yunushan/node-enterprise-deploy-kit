---
- name: Normalize Windows Node deployment selections
  ansible.builtin.set_fact:
    node_deploy_app_framework_normalized: "{{ node_deploy_app_framework | default('nextjs') | lower | regex_replace('_', '-') }}"
    node_deploy_nextjs_deployment_mode_normalized: "{{ node_deploy_nextjs_deployment_mode | default('standalone') | lower | regex_replace('_', '-') }}"

- name: Validate Windows application framework
  ansible.builtin.fail:
    msg: "Unsupported node_deploy_app_framework={{ node_deploy_app_framework | default('nextjs') }}. Use node, nextjs, or reactjs."
  when: node_deploy_app_framework_normalized not in ['node', 'next', 'nextjs', 'next-js', 'react', 'reactjs', 'react-js']

- name: Validate Windows Next.js deployment mode
  ansible.builtin.fail:
    msg: "Unsupported node_deploy_nextjs_deployment_mode={{ node_deploy_nextjs_deployment_mode | default('standalone') }}. Use standalone or next-start."
  when:
    - node_deploy_app_framework_normalized in ['next', 'nextjs', 'next-js']
    - node_deploy_nextjs_deployment_mode_normalized not in ['standalone', 'next-start']

- name: Ensure Windows service directory exists
  ansible.windows.win_file:
    path: "{{ node_deploy_windows_service_dir }}"
    state: directory

- name: Ensure Windows log directory exists
  ansible.windows.win_file:
    path: "{{ node_deploy_windows_log_dir }}"
    state: directory

- name: Ensure Windows deployment support directories exist
  ansible.windows.win_file:
    path: "{{ node_deploy_windows_service_dir }}\\{{ item }}"
    state: directory
  loop:
    - scripts\\windows
    - templates\\windows
    - tools\\winsw

- name: Render Windows app config
  ansible.windows.win_template:
    src: app.config.json.j2
    dest: "{{ node_deploy_windows_service_dir }}\\app.config.json"

- name: Copy deployment scripts
  ansible.windows.win_copy:
    src: "../../../../scripts/windows/"
    dest: "{{ node_deploy_windows_service_dir }}\\scripts\\windows\\"

- name: Copy Windows templates
  ansible.windows.win_copy:
    src: "../../../../templates/windows/"
    dest: "{{ node_deploy_windows_service_dir }}\\templates\\windows\\"

- name: Copy Windows deployment orchestrator
  ansible.windows.win_copy:
    src: "../../../../deploy.ps1"
    dest: "{{ node_deploy_windows_service_dir }}\\deploy.ps1"

- name: Require WinSW source when auto-download is disabled
  ansible.builtin.fail:
    msg: "Set node_deploy_windows_winsw_source to a controller-side WinSW executable or enable node_deploy_windows_auto_download_winsw."
  when:
    - node_deploy_windows_service_manager == 'winsw'
    - node_deploy_windows_winsw_source | default('') | length == 0
    - not (node_deploy_windows_auto_download_winsw | default(true) | bool)

- name: Copy WinSW executable
  ansible.windows.win_copy:
    src: "{{ node_deploy_windows_winsw_source }}"
    dest: "{{ node_deploy_windows_service_dir }}\\tools\\winsw\\winsw-x64.exe"
  when:
    - node_deploy_windows_service_manager == 'winsw'
    - node_deploy_windows_winsw_source | default('') | length > 0

- name: Deploy Windows Node app using local orchestrator
  ansible.windows.win_shell: >
    powershell.exe -ExecutionPolicy Bypass -File "{{ node_deploy_windows_service_dir }}\\deploy.ps1"
    -ConfigPath "{{ node_deploy_windows_service_dir }}\\app.config.json"
    {% if node_deploy_skip_preflight | default(false) | bool %}-SkipPreflight{% endif %}
    {% if node_deploy_allow_port_in_use | default(false) | bool %}-AllowPortInUse{% endif %}
    {% if node_deploy_skip_package_import | default(false) | bool %}-SkipPackageImport{% endif %}
    {% if node_deploy_skip_reverse_proxy | default(false) | bool %}-SkipReverseProxy{% endif %}
    {% if (node_deploy_skip_health_check | default(false) | bool) or not (node_deploy_healthcheck_enabled | default(true) | bool) %}-SkipHealthCheck{% endif %}
    {% if node_deploy_skip_install | default(false) | bool %}-SkipInstall{% endif %}
    {% if node_deploy_skip_build | default(false) | bool %}-SkipBuild{% endif %}
  args:
    executable: cmd
