---
- name: Normalize Linux service manager
  ansible.builtin.set_fact:
    node_deploy_linux_service_manager_normalized: "{{ node_deploy_linux_service_manager | default('systemd') | lower | regex_replace('_', '-') }}"

- name: Validate Linux service manager
  ansible.builtin.fail:
    msg: "Unsupported node_deploy_linux_service_manager={{ node_deploy_linux_service_manager }}. Use systemd, systemv, or openrc."
  when: node_deploy_linux_service_manager_normalized not in ['systemd', 'systemv', 'sysv', 'sysvinit', 'initd', 'init-d', 'openrc']

- name: Ensure service group exists
  ansible.builtin.group:
    name: "{{ node_deploy_linux_service_group }}"
    system: true

- name: Ensure service user exists
  ansible.builtin.user:
    name: "{{ node_deploy_linux_service_user }}"
    group: "{{ node_deploy_linux_service_group }}"
    system: true
    shell: "{{ '/sbin/nologin' if ansible_os_family == 'Alpine' else '/usr/sbin/nologin' }}"
    home: "{{ node_deploy_app_dir_linux }}"

- name: Ensure directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ node_deploy_app_dir_linux }}", owner: "{{ node_deploy_linux_service_user }}", group: "{{ node_deploy_linux_service_group }}", mode: "0750" }
    - { path: "{{ node_deploy_linux_log_dir }}", owner: "{{ node_deploy_linux_service_user }}", group: "{{ node_deploy_linux_service_group }}", mode: "0750" }

- name: Render environment file
  ansible.builtin.template:
    src: app.env.j2
    dest: "/etc/{{ node_deploy_project_name }}.env"
    owner: root
    group: "{{ node_deploy_linux_service_group }}"
    mode: "0640"

- name: Render systemd unit
  ansible.builtin.template:
    src: node-app.service.j2
    dest: "/etc/systemd/system/{{ node_deploy_project_name }}.service"
    mode: "0644"
  when: node_deploy_linux_service_manager_normalized == 'systemd'

- name: Enable and restart systemd service
  ansible.builtin.systemd:
    name: "{{ node_deploy_project_name }}"
    enabled: true
    state: restarted
    daemon_reload: true
  when: node_deploy_linux_service_manager_normalized == 'systemd'

- name: Render System V init script
  ansible.builtin.template:
    src: node-app.sysv.j2
    dest: "/etc/init.d/{{ node_deploy_project_name }}"
    mode: "0755"
  when: node_deploy_linux_service_manager_normalized in ['systemv', 'sysv', 'sysvinit', 'initd', 'init-d']

- name: Render OpenRC init script
  ansible.builtin.template:
    src: node-app.openrc.j2
    dest: "/etc/init.d/{{ node_deploy_project_name }}"
    mode: "0755"
  when: node_deploy_linux_service_manager_normalized == 'openrc'

- name: Enable and restart init service
  ansible.builtin.service:
    name: "{{ node_deploy_project_name }}"
    enabled: true
    state: restarted
  when: node_deploy_linux_service_manager_normalized != 'systemd'
