---
- name: Normalize Linux service manager
  ansible.builtin.set_fact:
    node_deploy_linux_service_manager_normalized: "{{ node_deploy_linux_service_manager | default('systemd') | lower | regex_replace('_', '-') }}"
    node_deploy_linux_reverse_proxy_normalized: "{{ node_deploy_linux_reverse_proxy | default('none') | lower | regex_replace('_', '-') }}"
    node_deploy_app_runtime_normalized: "{{ node_deploy_app_runtime | default('node') | lower | regex_replace('_', '-') }}"

- name: Validate Linux service manager
  ansible.builtin.fail:
    msg: "Unsupported node_deploy_linux_service_manager={{ node_deploy_linux_service_manager }}. Use systemd, systemv, openrc, launchd, or bsdrc."
  when: node_deploy_linux_service_manager_normalized not in ['systemd', 'systemv', 'sysv', 'sysvinit', 'initd', 'init-d', 'openrc', 'launchd', 'bsdrc', 'bsd-rc', 'rcd', 'rc.d']

- name: Validate Linux reverse proxy
  ansible.builtin.fail:
    msg: "Unsupported node_deploy_linux_reverse_proxy={{ node_deploy_linux_reverse_proxy }}. Use nginx, apache, haproxy, traefik, or none."
  when: node_deploy_linux_reverse_proxy_normalized not in ['nginx', 'apache', 'httpd', 'haproxy', 'traefik', 'none', '']

- name: Validate application runtime
  ansible.builtin.fail:
    msg: "Unsupported node_deploy_app_runtime={{ node_deploy_app_runtime | default('node') }}. Use node or tomcat."
  when: node_deploy_app_runtime_normalized not in ['node', 'tomcat', 'apache-tomcat']

- name: Ensure Linux deployment support directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ node_deploy_linux_deploy_dir }}"
    - "{{ node_deploy_linux_deploy_dir }}/scripts/linux"
    - "{{ node_deploy_linux_deploy_dir }}/templates/linux"
    - "{{ node_deploy_linux_config_path | dirname }}"

- name: Copy Linux deployment entrypoint
  ansible.builtin.copy:
    src: "../../../../deploy.sh"
    dest: "{{ node_deploy_linux_deploy_dir }}/deploy.sh"
    mode: "0755"

- name: Copy Linux deployment scripts
  ansible.builtin.copy:
    src: "../../../../scripts/linux/"
    dest: "{{ node_deploy_linux_deploy_dir }}/scripts/linux/"
    mode: "0755"
    directory_mode: "0755"

- name: Copy Linux templates
  ansible.builtin.copy:
    src: "../../../../templates/linux/"
    dest: "{{ node_deploy_linux_deploy_dir }}/templates/linux/"
    mode: "0644"
    directory_mode: "0755"

- name: Render Linux deployment config
  ansible.builtin.template:
    src: deploy.env.j2
    dest: "{{ node_deploy_linux_config_path }}"
    owner: root
    group: root
    mode: "0640"

- name: Optionally install Linux dependencies
  ansible.builtin.command:
    argv:
      - bash
      - "{{ node_deploy_linux_deploy_dir }}/scripts/linux/install-dependencies.sh"
      - "{{ node_deploy_linux_config_path }}"
  when: node_deploy_linux_install_dependencies | default(false) | bool
  changed_when: true

- name: Deploy Linux Node app using local orchestrator
  ansible.builtin.command:
    argv:
      - bash
      - "{{ node_deploy_linux_deploy_dir }}/deploy.sh"
      - "{{ node_deploy_linux_config_path }}"
  changed_when: true
